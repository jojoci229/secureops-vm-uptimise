name: Deploy to Azure VM

on:
  push:
    branches: [ main ]
    paths:
      - 'site/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Backup current version on VM
        run: |
          az vm run-command invoke \
            --resource-group rg-ticket-insights \
            --name vm-portfolio-lab \
            --command-id RunShellScript \
            --scripts "sudo cp /var/www/html/index.html /var/www/html/index.html.previous 2>/dev/null || true"

      - name: Deploy index.html to VM
        run: |
          ENCODED_CONTENT=$(base64 -w 0 site/index.html)
          az vm run-command invoke \
            --resource-group rg-ticket-insights \
            --name vm-portfolio-lab \
            --command-id RunShellScript \
            --scripts "echo $ENCODED_CONTENT | base64 -d | sudo tee /var/www/html/index.html > /dev/null && sudo systemctl reload nginx"